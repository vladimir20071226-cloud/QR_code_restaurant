{% extends "base.html" %}
{% block title %}Заказ блюда{% endblock %}
{% block content %}
<div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-header bg-success text-white">
            <h2 class="mb-0"><i class="bi bi-cart"></i> Заказ блюда: {{ dish.name }}</h2>
        </div>
        <div class="card-body">
            <form method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-person"></i> Ваше имя</label>
                    <input type="text" name="customer_name" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-telephone"></i> Телефон</label>
                    <input type="text" name="phone" class="form-control" required>
                </div>
                <div class="mb-3">
                    <label class="form-label"><i class="bi bi-plus-circle"></i> Количество</label>
                    <input type="number" name="quantity" class="form-control" min="1" value="1">
                </div>
                <button type="submit" class="btn btn-success w-100">
                    <i class="bi bi-check-circle"></i> Оформить заказ
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock
