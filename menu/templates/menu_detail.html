{% extends "base.html" %}
{% block title %}{{ dish.name }}{% endblock %}
{% block content %}
<div class="card">
    <div class="card-body">
        <h2>{{ dish.name }}</h2>
        <p>{{ dish.description }}</p>
        <p><strong>Цена:</strong> {{ dish.price }} ₸</p>
        <a href="/menus" class="btn btn-secondary">Назад к меню</a>
    </div>
</div>
{% endblock %}
